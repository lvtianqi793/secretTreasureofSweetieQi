<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI 询问</title>
    <!-- 勿用「双击打开」本文件：必须通过 `npm run dev` 或 `npm run preview` 访问，否则脚本无法加载会白屏。 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Noto+Sans+SC:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="app">
      <div
        id="vite-boot-hint"
        style="
          box-sizing: border-box;
          max-width: 32rem;
          margin: 2rem auto;
          padding: 1.5rem 1.75rem;
          font: 15px/1.6 system-ui, 'Segoe UI', sans-serif;
          color: #1a1a1a;
          background: #f6f7f9;
          border: 1px solid #d0d5dd;
          border-radius: 12px;
        "
      >
        <strong style="display: block; margin-bottom: 0.5rem">若一直白屏：本页不能直接当本地文件打开</strong>
        <p style="margin: 0 0 0.75rem">
          请在终端进入 <code style="background: #fff; padding: 0.1rem 0.35rem; border-radius: 4px">frontend</code> 目录后执行：
        </p>
        <pre
          style="
            margin: 0 0 0.75rem;
            padding: 0.75rem 1rem;
            background: #fff;
            border-radius: 8px;
            overflow: auto;
            font-size: 13px;
          "
        ><code>npm install
npm run dev</code></pre>
        <p style="margin: 0">
          在浏览器打开终端里显示的地址（一般为 <code style="background: #fff; padding: 0.1rem 0.35rem; border-radius: 4px">http://localhost:5173</code>）。构建后请用
          <code style="background: #fff; padding: 0.1rem 0.35rem; border-radius: 4px">npm run preview</code>，不要双击
          <code style="background: #fff; padding: 0.1rem 0.35rem; border-radius: 4px">dist/index.html</code>。
        </p>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
