server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: energy-management
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/energy_management}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false
  servlet:
    multipart:
      max-file-size: 2048MB
      max-request-size: 2048MB

# AI Model Configuration (supports OpenAI-compatible APIs)
ai:
  api:
    base-url: ${AI_API_BASE_URL:http://localhost:8000}
    api-key: ${AI_API_API_KEY:}
    model: ${AI_API_MODEL:qwen3.5:2b}
    timeout: ${AI_API_TIMEOUT:120}
    max-tokens: ${AI_API_MAX_TOKENS:4096}

# CSV data import path
data:
  import:
    base-path: /data/csv

# Logging
logging:
  level:
    com.energy.management: DEBUG
    org.hibernate.SQL: WARN
  # 生产环境日志配置
  file:
    name: /var/log/energy-management/application.log
    max-size: 10MB
    max-history: 7
    total-size-cap: 100MB
  # 日志格式
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %-5level - %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} - %-5level - %logger{36} - %msg%n"
