server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: energy-management
  datasource:
    url: jdbc:postgresql://localhost:5432/energy_management
    username: postgres
    password: ltqltq2005
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false
  servlet:
    multipart:
      max-file-size: 2048MB
      max-request-size: 2048MB

# AI Model Configuration (supports OpenAI-compatible APIs)
ai:
  api:
    base-url: http://localhost:11434/v1  # Ollama local or any OpenAI-compatible endpoint
    api-key: your-api-key-here
    model: qwen2.5:7b                    # Model name
    timeout: 120                          # Timeout in seconds
    max-tokens: 4096

# CSV data import path
data:
  import:
    base-path: ./data/csv

# Logging
logging:
  level:
    com.energy.management: DEBUG
    org.hibernate.SQL: WARN
