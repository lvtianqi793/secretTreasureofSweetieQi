# 能源管理系统 - 统一Docker Compose配置
# 包含后端服务、数据库和AI网关服务，所有服务都连接到docker_ragflow网络

services:
  # Spring Boot后端服务
  energy-backend:
    build:
      context: ./backend # 指向backend目录
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      # 数据库连接配置
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/energy_management
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=ltqltq2005
      # JPA配置
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_JPA_SHOW_SQL=true
      - SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL=true
      # AI配置（可通过环境变量覆盖）
      - AI_API_BASE_URL=http://ai-gateway:8000
      - AI_API_API_KEY=
      - AI_API_MODEL=qwen3.5:9b
      - AI_API_TIMEOUT=120
      - AI_API_MAX_TOKENS=4096
      # 时区配置
      - TZ=Asia/Shanghai
    restart: always
    depends_on:
      - postgres-db
    networks:
      - docker_ragflow

  # PostgreSQL数据库服务（带初始化）
  postgres-db:
    build:
      context: ./db
      dockerfile: Dockerfile
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=ltqltq2005
      - POSTGRES_DB=energy_management
      - TZ=Asia/Shanghai
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./data/csv:/data/csv:ro # 挂载CSV数据目录（只读）
    restart: always
    networks:
      - docker_ragflow

  # AI网关服务 (FastAPI + Ollama)
  ai-gateway:
    build:
      context: ./ai/mvp-ollama-gateway
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_URL=http://172.17.0.1:11434
      - OLLAMA_MODEL=qwen3.5:9b
      - SYSTEM_PROMPT_FILE=./prompts/system_prompt.txt
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - LOG_LEVEL=INFO
      - SYSTEM_CHAT_PROMPT_FILE=./prompts/system_chat_prompt.txt
      - SYSTEM_GENERATESQL_PROMPT_FILE=./prompts/system_generatesql_prompt.txt
      - SYSTEM_ANALYSE_PROMPT_FILE=./prompts/system_analyse_prompt.txt
      - RAGFLOW_ENABLED=true
      - RAGFLOW_BASE_URL=http://docker-ragflow-cpu-1:9380
      - RAGFLOW_API_KEY=ragflow-KsoVCRYf6PH3XsmEdRpd55VvyvXX4X9VIklMeSx_Nlg
      - RAGFLOW_CHAT_ID=3cdc8cd4358a11f1abefd962d5631214
    networks:
      - docker_ragflow

# 数据卷：持久化PostgreSQL数据
volumes:
  postgres-data:

# 使用外部docker_ragflow网络
networks:
  docker_ragflow:
    external: true
